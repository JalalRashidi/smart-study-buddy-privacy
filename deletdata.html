<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Your Data - Smart Study Buddy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100">

  <div class="min-h-screen flex items-center justify-center px-4">
    
    <div class="max-w-xl w-full bg-white shadow-lg rounded-2xl p-8">
      
      <h1 class="text-2xl font-bold text-gray-800 mb-2">
        Delete Your Account & Data
      </h1>

      <p class="text-gray-600 mb-6 text-sm">
        You can request to delete your account and all associated data. 
        This action is permanent and cannot be undone.
      </p>

      <form id="deleteForm" class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Email Address *
          </label>
          <input 
            type="email" 
            required
            placeholder="Enter your email"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Username (Optional)
          </label>
          <input 
            type="text"
            placeholder="Enter your username"
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          />
        </div>

        <!-- Reason -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Reason (Optional)
          </label>
          <textarea 
            rows="3"
            placeholder="Tell us why you're leaving..."
            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
          ></textarea>
        </div>

        <!-- Confirmation -->
        <div class="flex items-start gap-2">
          <input type="checkbox" required class="mt-1" />
          <label class="text-sm text-gray-600">
            I understand that this action will permanently delete my data.
          </label>
        </div>

        <!-- Submit -->
        <button 
          type="submit"
          class="w-full bg-red-500 text-white py-2 rounded-lg hover:bg-red-600 transition"
        >
          Request Data Deletion
        </button>

      </form>

      <!-- Success Message -->
      <p id="successMsg" class="hidden text-green-600 text-sm mt-4">
        Your request has been submitted successfully.
      </p>

    </div>

  </div>

  <script>
    const form = document.getElementById("deleteForm");
    const successMsg = document.getElementById("successMsg");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      // TODO: connect with backend API
      // Example:
      // fetch("https://your-api.com/delete-request", { method: "POST" })

      successMsg.classList.remove("hidden");
      form.reset();
    });
  </script>

</body>
</html>
